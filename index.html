<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculadora de Kauã</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="calculadora">
    <div class="visor">
      <p class="visor__historico" id="historico"></p>
      <p class="visor__resultado" id="resultado">0</p>
    </div>

    <div class="botoes">
      <button class="botao botao--especial" id="btn-limpar">C</button>
      <button class="botao botao--especial" id="btn-apagar">⌫</button>
      <button class="botao botao--especial" id="btn-porcentagem">%</button>
      <button class="botao botao--operador" data-valor="/">÷</button>

      <button class="botao" data-valor="7">7</button>
      <button class="botao" data-valor="8">8</button>
      <button class="botao" data-valor="9">9</button>
      <button class="botao botao--operador" data-valor="*">×</button>

      <button class="botao" data-valor="4">4</button>
      <button class="botao" data-valor="5">5</button>
      <button class="botao" data-valor="6">6</button>
      <button class="botao botao--operador" data-valor="-">−</button>

      <button class="botao" data-valor="1">1</button>
      <button class="botao" data-valor="2">2</button>
      <button class="botao" data-valor="3">3</button>
      <button class="botao botao--operador" data-valor="+">+</button>

      <button class="botao botao--zero" data-valor="0">0</button>
      <button class="botao" data-valor=".">.</button>
      <button class="botao botao--igual" id="btn-igual">=</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
